{% extends 'base.html' %}

{% block title %}Hoàn tất đặt lại mật khẩu{% endblock %}

{% block content %}
<div class="content">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h4 class="card-title">Mật khẩu đã được cập nhật</h4>
                        <p class="text-muted">Mật khẩu của bạn đã được thay đổi thành công. Bạn có thể đăng nhập bằng mật khẩu mới.</p>
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
